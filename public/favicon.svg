<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark navy background -->
  <rect width="64" height="64" rx="12" fill="#050510"/>

  <!-- Stylized S -->
  <path d="M 14,22 C 14,17 20,14 25,16 C 31,18 30,23 25,25 C 20,27 14,28 14,34 C 14,40 20,43 26,41 C 32,39 33,35 31,33"
    fill="none" stroke="url(#grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Stylized M -->
  <path d="M 35,41 L 35,20 L 43,33 L 51,20 L 51,41"
    fill="none" stroke="url(#grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Underline flourish -->
  <path d="M 10,47 Q 32,52 54,47"
    fill="none" stroke="url(#grad)" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
</svg>
